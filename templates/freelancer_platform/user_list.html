<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        table {
            width: 80%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        a.whatsapp-button {
            display: inline-block;
            padding: 8px 12px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        a.whatsapp-button:hover {
            background-color: #128C7E;
        }
    </style>
</head>

<body>
    <h1>Users List</h1>

    <table>
        <thead>
            <tr>
                <th>Username</th>
                <th>WhatsApp Chat</th>
            </tr>
        </thead>

        <tbody>
            {% for profile in user_profiles %}
            <tr>
                <td>{{ profile.user.username }}</td>
                <td>
                    <a class="whatsapp-button" href="https://api.whatsapp.com/send?phone={{ profile.phone_number }}" target="_blank">
                        💬 Chat on WhatsApp
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>

</html>
