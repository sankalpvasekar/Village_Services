<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, setLogLevel } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase configuration and initialization (no changes needed here)
        setLogLevel('Debug');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        const firebaseConfig = typeof _firebase_config !== 'undefined' ? JSON.parse(_firebase_config) : {};
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        let db, auth, userId;

        window.onload = async function() {
            // ... (Firebase initialization logic is unchanged)
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        document.getElementById('user-id').textContent = userId.substring(0, 8) + '...';
                        setupMessageListener();
                    } else {
                        console.log("User is signed out.");
                    }
                });
                document.getElementById('send-message-form').addEventListener('submit', handleSendMessage);
            } catch (error) {
                console.error("Error initializing Firebase:", error);
            }
        };
        
        const CHAT_ID = "job_12345";
        document.getElementById('chat-id-display').textContent = CHAT_ID;
        
        async function setupMessageListener() {
            if (!db || !userId) { return; }
            
            const chatCollectionPath = `/artifacts/${appId}/public/data/chats/${CHAT_ID}/messages`;
            const chatCollectionRef = collection(db, chatCollectionPath);
            const q = query(chatCollectionRef, orderBy('timestamp'));

            onSnapshot(q, (snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = ''; // Clear chat box
                snapshot.forEach((doc) => {
                    const message = doc.data();
                    const messageElement = document.createElement('div');
                    
                    const isCurrentUser = message.senderId === userId;
                    const alignmentClass = isCurrentUser ? 'justify-end' : 'justify-start';
                    
                    // --- THEME CHANGE APPLIED HERE ---
                    // Updated the background colors for chat bubbles to match the dark theme
                    const messageBg = isCurrentUser ? 'bg-cyan-500 text-slate-900' : 'bg-slate-700 text-slate-300';
                    const senderText = isCurrentUser ? 'You' : `User: ${message.senderId.substring(0, 8)}`;
                    
                    messageElement.className = `flex ${alignmentClass} mb-3`;
                    messageElement.innerHTML = `
                        <div class="rounded-lg py-2 px-3 max-w-xs md:max-w-md ${messageBg}">
                            <div class="text-xs font-bold mb-1 opacity-70">${senderText}</div>
                            <div class="text-sm break-words">${message.text}</div>
                        </div>
                    `;
                    chatBox.appendChild(messageElement);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }, (error) => {
                console.error("Error listening to messages:", error);
            });
        }
        
        async function handleSendMessage(event) {
            // ... (handleSendMessage logic is unchanged)
            event.preventDefault();
            const messageInput = document.getElementById('message-input');
            const messageText = messageInput.value.trim();
            if (messageText === '' || !db || !userId) { return; }
            try {
                const chatCollectionPath = `/artifacts/${appId}/public/data/chats/${CHAT_ID}/messages`;
                const chatCollectionRef = collection(db, chatCollectionPath);
                await addDoc(chatCollectionRef, {
                    senderId: userId,
                    text: messageText,
                    timestamp: new Date().toISOString(),
                });
                messageInput.value = '';
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        }
    </script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 font-sans">
    <div class="w-full max-w-2xl bg-slate-800 rounded-xl shadow-2xl overflow-hidden flex flex-col h-[90vh] md:h-[80vh]">
        
        <div class="bg-slate-700 text-white p-4 text-center border-b border-slate-600 flex-shrink-0">
            <h1 class="text-xl font-bold">Real-Time Chat</h1>
            <div class="text-xs text-slate-400 mt-1 space-x-4">
                <span>Chat ID: <span id="chat-id-display" class="font-semibold"></span></span>
                <span>Your User ID: <span id="user-id" class="font-semibold"></span></span>
            </div>
        </div>

        <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4">
            <div class="flex justify-center items-center h-full text-slate-500 text-sm">
                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-slate-600 mr-2"></div>
                Loading messages...
            </div>
        </div>
<form id="send-message-form" class="p-4 border-t border-slate-700 flex items-center gap-3 bg-slate-800 flex-shrink-0">
            <input type="text" id="message-input" placeholder="Type a message..." required
                   class="flex-grow px-4 py-2 bg-slate-900 border border-slate-600 rounded-full text-slate-300 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 transition-colors">
            <button type="submit"
                    class="bg-cyan-500 text-slate-900 rounded-full p-3 hover:bg-cyan-400 transition-colors flex-shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </form>
    </div>
</body>
</html>
