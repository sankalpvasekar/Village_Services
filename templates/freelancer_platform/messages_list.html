{% extends 'freelancer_platform/base.html' %}

{% block title %}Messages{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Messages</h1>

<div class="space-y-4">
    {% for profile in user_profiles %}
        <div class="p-4 bg-white rounded shadow flex items-center justify-between">
            <div>
                <p class="font-medium text-lg">{{ profile.user.username }}</p>
                <p class="text-sm text-gray-500">Phone: {{ profile.phone_number }}</p>
            </div>
            <a href="https://wa.me/{{ profile.phone_number }}" target="_blank"
               class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded flex items-center space-x-2">
               <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                   <path d="M..." /> <!-- Use WhatsApp icon SVG path -->
               </svg>
               <span>Chat</span>
            </a>
        </div>
    {% endfor %}
</div>
{% endblock %}
